name: Lint Code Base

# ファイルが書き換えられたり、Pull Requestが来たら自動起動
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # チェックのために全履歴を取得
          fetch-depth: 0

      # GitHub公式の何でもチェックしてくれるリンターを起動
      - name: Lint Code Base
        uses: super-linter/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: false # 変更されたファイルだけを賢くチェック
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 自動実行に必要な合言葉
